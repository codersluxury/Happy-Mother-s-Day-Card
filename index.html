<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-dectection" content="telephone=no, date=no, address=no, email=no">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Mother's Day Card</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Arial', sans-serif;
}

body {
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
background: linear-gradient(135deg, #ffdde1, #ee9ca7);
overflow: hidden;
}

.card-container {
perspective: 1000px;
}

.card {
width: 350px;
height: 220px;
position: relative;
transform-style: preserve-3d;
transition: transform 1s ease;
cursor: pointer;
}

.card-container:hover .card {
transform: rotateY(180deg);
}

.card-front,
.card-inside {
position: absolute;
width: 100%;
height: 100%;
border-radius: 15px;
backface-visibility: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.card-front {
background: linear-gradient(135deg, #ff6f91, #ff9671);
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
color: white;
text-align: center;
}

.card-front h1 {
font-size: 2rem;
margin-bottom: 10px;
}

.card-front p {
font-size: 1rem;
}

.card-inside {
background: white;
transform: rotateY(180deg);
padding: 25px;
text-align: center;
color: #444;
}

.card-inside h2 {
color: #e75480;
margin-bottom: 15px;
}

.card-inside p {
font-size: 1rem;
line-height: 1.6;
}

/* Floating hearts */
.heart {
position: absolute;
color: rgba(255,255,255,0.7);
font-size: 20px;
animation: float 6s infinite ease-in-out;
}

.heart:nth-child(1) {
left: 10%;
animation-delay: 0s;
}

.heart:nth-child(2) {
left: 50%;
animation-delay: 2s;
}

.heart:nth-child(3) {
left: 80%;
animation-delay: 4s;
}

@keyframes float {
0% {
transform: translateY(100vh) scale(1);
opacity: 0;
}
50% {
opacity: 1;
}
100% {
transform: translateY(-100px) scale(1.5);
opacity: 0;
}
}
</style>
</head>
<body>

<div class="heart">❤️</div>
<div class="heart">💖</div>
<div class="heart">💕</div>

<div class="card-container">
<div class="card">
<div class="card-front">
<h1>Happy Mother's Day 💐</h1>
<p>Hover to open your card</p>
</div>

<div class="card-inside">
<h2>To All Amazing Mothers ❤️</h2>
<p>
Wishing all mothers around the world a day filled with love,
joy, and appreciation. Thank you for your endless sacrifices,
unconditional love, and strength.
<br><br>
You are truly cherished today and always. 🌸
</p>
</div>
</div>
</div>

</body>
</html>
